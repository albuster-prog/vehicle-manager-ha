      - detailing
      - aspirare
      - anvelope
      - jante
      - echilibrare
      - revizie
      - ulei
      - frane
      - baterie
      - itp
      - rca
      - casco
      - rovinieta
      - combustibil
      - incarcare
      - accesorii
      - altele
    initial: spalare
    icon: mdi:tag

input_number:
