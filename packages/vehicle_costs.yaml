# ═══════════════════════════════════════════════════════════
# SENSORS — documente Toyota Avensis
# ═══════════════════════════════════════════════════════════
template:
  - sensor:
    # ── Toyota Avensis RCA ────────────────────────────
    - name: "Toyota Avensis RCA"
      unique_id: avensis_rca_insurance
      icon: mdi:shield-car
      state: >
        {% set expiry = "2026-12-20" %}
        {% set days = ((expiry | as_datetime) - now()).days %}
        {% if days < 0 %}EXPIRAT
        {% elif days <= 30 %}EXPIRA CURAND
        {% else %}ACTIV{% endif %}
      attributes:
        expiry_date: "20.12.26"
        days_remaining: >
          {% set expiry = "2026-12-20" %}
          {{ ((expiry | as_datetime) - now()).days | int }}
        start_date: "21.12.25"
        company: "GRAWE"
        vehicle: "Toyota Avensis IF08COB"

    # ── Toyota Avensis ITP ───────────────────────────
    - name: "Toyota Avensis ITP"
      unique_id: avensis_itp
      icon: mdi:clipboard-check
      state: >
        {% set expiry = "2026-08-07" %}
        {% set days = ((expiry | as_datetime) - now()).days %}
        {% if days < 0 %}EXPIRAT
        {% elif days <= 30 %}EXPIRA CURAND
        {% else %}ACTIV{% endif %}
      attributes:
        expiry_date: "07.08.26"
        days_remaining: >
          {% set expiry = "2026-08-07" %}
          {{ ((expiry | as_datetime) - now()).days | int }}
        frequency: "anual"
        vehicle: "Toyota Avensis IF08COB"

    # ── Toyota Avensis Rovinieta ─────────────────────
    - name: "Toyota Avensis Rovinieta"
      unique_id: avensis_rovinieta
      icon: mdi:road
      state: "EXPIRATA"
      attributes:
        expiry_date: "expirata"
        days_remaining: -999
        vehicle: "Toyota Avensis IF08COB"
        note: "Rovinieta expirata — reinnoire necesara"

    # ── Suzuki GSXR 750 RCA ──────────────────────────
    - name: "Suzuki GSXR RCA"
      unique_id: gsxr_rca_insurance
      icon: mdi:shield-car
      state: >
        {% set expiry = "2026-07-07" %}
        {% set days = ((expiry | as_datetime) - now()).days %}
        {% if days < 0 %}EXPIRAT
        {% elif days <= 30 %}EXPIRA CURAND
        {% else %}ACTIV{% endif %}
      attributes:
        expiry_date: "07.07.26"
        days_remaining: >
          {% set expiry = "2026-07-07" %}
          {{ ((expiry | as_datetime) - now()).days | int }}
        start_date: "08.07.25"
        company: "Groupama"
        vehicle: "Suzuki GSXR 750"

    # ── Suzuki GSXR 750 ITP ──────────────────────────
    - name: "Suzuki GSXR ITP"
      unique_id: gsxr_itp
      icon: mdi:clipboard-check
      state: >
        {% set expiry = "2027-07-15" %}
        {% set days = ((expiry | as_datetime) - now()).days %}
        {% if days < 0 %}EXPIRAT
        {% elif days <= 30 %}EXPIRA CURAND
        {% else %}ACTIV{% endif %}
      attributes:
        expiry_date: "15.07.27"
        days_remaining: >
          {% set expiry = "2027-07-15" %}
          {{ ((expiry | as_datetime) - now()).days | int }}
        frequency: "la 2 ani (fabricatie 2004 - sub 10 ani vechime la ITP actual)"
        vehicle: "Suzuki GSXR 750"

# ═══════════════════════════════════════════════════════════
# SCRIPT — inregistrare cost
# ═══════════════════════════════════════════════════════════
script:
  vehicle_register_cost:
    alias: "Inregistreaza cost vehicul"
    description: "Adauga un cost pentru vehiculul selectat in categoria selectata"
    sequence:
      - service: input_number.set_value
        data_template:
          entity_id: >
            {% set v = states('input_select.vehicle_cost_vehicle') %}
            {% set c = states('input_select.vehicle_cost_category') %}
            {% if 'Kia' in v %}input_number.kia_cat_{{ c }}_month
            {% elif 'Avensis' in v %}input_number.avensis_cat_{{ c }}_month
            {% elif 'GSXR' in v or 'Suzuki' in v %}input_number.gsxr_cat_{{ c }}_month
            {% else %}input_number.vehicle_costs_total_month
            {% endif %}
          value: >
            {% set v = states('input_select.vehicle_cost_vehicle') %}
            {% set c = states('input_select.vehicle_cost_category') %}
            {% set amount = states('input_number.vehicle_cost_amount') | float %}
            {% if 'Kia' in v %}
              {{ states('input_number.kia_cat_' ~ c ~ '_month') | float + amount }}
            {% elif 'Avensis' in v %}
              {{ states('input_number.avensis_cat_' ~ c ~ '_month') | float + amount }}
            {% elif 'GSXR' in v or 'Suzuki' in v %}
              {{ states('input_number.gsxr_cat_' ~ c ~ '_month') | float + amount }}
            {% else %}
              {{ states('input_number.vehicle_costs_total_month') | float + amount }}
            {% endif %}
