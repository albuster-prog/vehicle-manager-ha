    action:
      - service: notify.notify
        data:
          title: >
            {% set d = states('sensor.kia_rovinieta_zile_ramase') | int %}
            {% if d < 0 %}🔴 Kia Rovinieta EXPIRATA!{% else %}⚠️ Kia Rovinieta expira in {{ d }} zile{% endif %}
          message: >
            {% set d = states('sensor.kia_rovinieta_zile_ramase') | int %}
            Rovinieta Kia eNiro — {% if d < 0 %}EXPIRATA!{% else %}expira pe {{ state_attr('sensor.kia_rovinieta_zile_ramase', 'expiry_date') }}. Mai sunt {{ d }} zile.{% endif %}
          data:
            priority: high
            tag: kia_rovinieta_expiry

  - id: notify_kia_permis_expiry
    alias: "Notificare Kia Permis expirare"
    trigger:
      - platform: time
