          title: >
            {% set d = states('sensor.kia_casco_zile_ramase') | int %}
            {% if d < 0 %}🔴 Kia CASCO EXPIRAT!{% else %}⚠️ Kia CASCO expira in {{ d }} zile{% endif %}
          message: >
            {% set d = states('sensor.kia_casco_zile_ramase') | int %}
            {% if d < 0 %}
              CASCO Kia eNiro a EXPIRAT! Reinnoieste imediat.
            {% else %}
              CASCO Kia eNiro expira pe {{ state_attr('sensor.kia_casco_zile_ramase', 'expiry_date') }}. Mai sunt {{ d }} zile.
            {% endif %}
          data:
            priority: high
            tag: kia_casco_expiry

  - id: notify_kia_itp_expiry
    alias: "Notificare Kia ITP expirare"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: state
