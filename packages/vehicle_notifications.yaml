# Vehicle Manager HA — Notificari mobile la expirare documente v2
# Pachet autonom — adauga in /config/packages/
# Necesita: companion app HA pe telefon (notify.mobile_app_*)
#
# DOCUMENTE MONITORIZATE:
# Kia eNiro:       RCA, CASCO, ITP, Rovinieta, Permis
# Toyota Avensis:  RCA, ITP, Rovinieta (expirata deja)
# Suzuki GSXR 750: RCA (Groupama), ITP (fara rovinieta)
#
# PRAGURI NOTIFICARE: 30 zile, 14 zile, 7 zile, 1 zi + EXPIRAT
# NOTIFICARE ZILNICA: 08:00 dimineata (doar daca e relevant)

# ═══════════════════════════════════════════════════════════
# INPUT BOOLEANS — toggle notificari per document
# ═══════════════════════════════════════════════════════════
input_boolean:
  notify_kia_rca:
    name: "Notificari Kia — RCA"
    initial: true
    icon: mdi:shield-car

  notify_kia_casco:
    name: "Notificari Kia — CASCO"
    initial: true
    icon: mdi:shield-check

  notify_kia_itp:
    name: "Notificari Kia — ITP"
    initial: true
    icon: mdi:clipboard-check

  notify_kia_rovinieta:
    name: "Notificari Kia — Rovinieta"
    initial: true
    icon: mdi:road

  notify_kia_permis:
    name: "Notificari Kia — Permis auto"
    initial: true
    icon: mdi:card-account-details

  notify_avensis_rca:
    name: "Notificari Avensis — RCA"
    initial: true
    icon: mdi:shield-car

  notify_avensis_itp:
    name: "Notificari Avensis — ITP"
    initial: true
    icon: mdi:clipboard-check

  notify_avensis_rovinieta:
    name: "Notificari Avensis — Rovinieta"
    initial: true
    icon: mdi:road

  notify_gsxr_rca:
    name: "Notificari GSXR — RCA"
    initial: true
    icon: mdi:shield-car

  notify_gsxr_itp:
    name: "Notificari GSXR — ITP"
    initial: true
    icon: mdi:clipboard-check

# ═══════════════════════════════════════════════════════════
# TEMPLATE SENSORS — zile ramase per document
# ═══════════════════════════════════════════════════════════
template:
  - sensor:
    # ── KIA eNiro ──────────────────────────────────────
    - name: "Kia RCA zile ramase"
      unique_id: kia_rca_days_remaining
      icon: mdi:shield-car
      unit_of_measurement: "zile"
      state: >
        {% set s = states('sensor.kia_eniro_rca') %}
        {% if s not in ['unknown','unavailable'] %}
          {{ state_attr('sensor.kia_eniro_rca', 'days_remaining') | int(0) }}
        {% else %}
          -1
        {% endif %}
      attributes:
        expiry_date: "{{ state_attr('sensor.kia_eniro_rca', 'expiry_date') }}"
        status: "{{ states('sensor.kia_eniro_rca') }}"

    - name: "Kia CASCO zile ramase"
      unique_id: kia_casco_days_remaining
      icon: mdi:shield-check
      unit_of_measurement: "zile"
      state: >
        {% set s = states('sensor.kia_eniro_casco') %}
        {% if s not in ['unknown','unavailable'] %}
          {{ state_attr('sensor.kia_eniro_casco', 'days_remaining') | int(0) }}
        {% else %}
          -1
        {% endif %}
      attributes:
        expiry_date: "{{ state_attr('sensor.kia_eniro_casco', 'expiry_date') }}"
        status: "{{ states('sensor.kia_eniro_casco') }}"

    - name: "Kia ITP zile ramase"
      unique_id: kia_itp_days_remaining
      icon: mdi:clipboard-check
      unit_of_measurement: "zile"
      state: >
        {% set s = states('sensor.kia_eniro_itp') %}
        {% if s not in ['unknown','unavailable'] %}
          {{ state_attr('sensor.kia_eniro_itp', 'days_remaining') | int(0) }}
        {% else %}
          -1
        {% endif %}
      attributes:
        expiry_date: "{{ state_attr('sensor.kia_eniro_itp', 'expiry_date') }}"
        status: "{{ states('sensor.kia_eniro_itp') }}"

    - name: "Kia Rovinieta zile ramase"
      unique_id: kia_rovinieta_days_remaining
      icon: mdi:road
      unit_of_measurement: "zile"
      state: >
        {% set s = states('sensor.kia_eniro_road_vignette') %}
        {% if s not in ['unknown','unavailable'] %}
          {{ state_attr('sensor.kia_eniro_road_vignette', 'days_remaining') | int(0) }}
        {% else %}
          -1
        {% endif %}
      attributes:
        expiry_date: "{{ state_attr('sensor.kia_eniro_road_vignette', 'expiry_date') }}"
        status: "{{ states('sensor.kia_eniro_road_vignette') }}"

    - name: "Kia Permis zile ramase"
      unique_id: kia_permis_days_remaining
      icon: mdi:card-account-details
      unit_of_measurement: "zile"
      state: >
        {% set s = states('sensor.kia_eniro_driver_license') %}
        {% if s not in ['unknown','unavailable'] %}
          {{ state_attr('sensor.kia_eniro_driver_license', 'days_remaining') | int(0) }}
        {% else %}
          -1
        {% endif %}
      attributes:
        expiry_date: "{{ state_attr('sensor.kia_eniro_driver_license', 'expiry_date') }}"
        status: "{{ states('sensor.kia_eniro_driver_license') }}"

    # ── Toyota Avensis ─────────────────────────────────
    - name: "Avensis RCA zile ramase"
      unique_id: avensis_rca_days_remaining
      icon: mdi:shield-car
      unit_of_measurement: "zile"
      state: >
        {% set expiry = "2026-12-20" %}
        {{ ((expiry | as_datetime) - now()).days | int }}
      attributes:
        expiry_date: "20.12.26"
        company: "GRAWE"
        vehicle: "Toyota Avensis IF08COB"

    - name: "Avensis ITP zile ramase"
      unique_id: avensis_itp_days_remaining
      icon: mdi:clipboard-check
      unit_of_measurement: "zile"
      state: >
        {% set expiry = "2026-08-07" %}
        {{ ((expiry | as_datetime) - now()).days | int }}
      attributes:
        expiry_date: "07.08.26"
        vehicle: "Toyota Avensis IF08COB"

    - name: "Avensis Rovinieta zile ramase"
      unique_id: avensis_rovinieta_days_remaining
      icon: mdi:road
      unit_of_measurement: "zile"
      state: "-999"
      attributes:
        expiry_date: "expirata"
        vehicle: "Toyota Avensis IF08COB"
        note: "Rovinieta expirata — reinnoire necesara"

    # ── Suzuki GSXR 750 ────────────────────────────────
    - name: "GSXR RCA zile ramase"
      unique_id: gsxr_rca_days_remaining
      icon: mdi:shield-car
      unit_of_measurement: "zile"
      state: >
        {% set expiry = "2026-07-07" %}
        {{ ((expiry | as_datetime) - now()).days | int }}
      attributes:
        expiry_date: "07.07.26"
        company: "Groupama"
        vehicle: "Suzuki GSXR 750"

    - name: "GSXR ITP zile ramase"
      unique_id: gsxr_itp_days_remaining
      icon: mdi:clipboard-check
      unit_of_measurement: "zile"
      state: >
        {% set expiry = "2027-07-15" %}
        {{ ((expiry | as_datetime) - now()).days | int }}
      attributes:
        expiry_date: "15.07.27"
        vehicle: "Suzuki GSXR 750"

# ═══════════════════════════════════════════════════════════
# AUTOMATION — notificari zilnice la 08:00
# ═══════════════════════════════════════════════════════════
automation:
  # ── KIA eNiro ────────────────────────────────────────
  - id: notify_kia_rca_expiry
    alias: "Notificare Kia RCA expirare"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.notify_kia_rca
        state: "on"
      - condition: template
        value_template: >
          {% set d = states('sensor.kia_rca_zile_ramase') | int(-99) %}
          {{ d in [30, 14, 7, 1] or d < 0 }}
    action:
      - service: notify.notify
        data:
          title: >
            {% set d = states('sensor.kia_rca_zile_ramase') | int %}
            {% if d < 0 %}🔴 Kia RCA EXPIRAT!{% else %}⚠️ Kia RCA expira in {{ d }} zile{% endif %}
          message: >
            {% set d = states('sensor.kia_rca_zile_ramase') | int %}
            {% if d < 0 %}
              RCA Kia eNiro a EXPIRAT! Reinnoieste imediat.
            {% else %}
              RCA Kia eNiro expira pe {{ state_attr('sensor.kia_rca_zile_ramase', 'expiry_date') }}. Mai sunt {{ d }} zile.
            {% endif %}
          data:
            priority: high
            tag: kia_rca_expiry

  - id: notify_kia_casco_expiry
    alias: "Notificare Kia CASCO expirare"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
