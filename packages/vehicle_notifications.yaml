    action:
      - service: notify.notify
        data:
          title: >
            {% set d = states('sensor.kia_itp_zile_ramase') | int %}
            {% if d < 0 %}🔴 Kia ITP EXPIRAT!{% else %}⚠️ Kia ITP expira in {{ d }} zile{% endif %}
          message: >
            {% set d = states('sensor.kia_itp_zile_ramase') | int %}
            CASCO Kia eNiro expira pe {{ state_attr('sensor.kia_itp_zile_ramase', 'expiry_date') }}. Mai sunt {{ d }} zile.
          data:
            priority: high
            tag: kia_itp_expiry

  - id: notify_kia_rovinieta_expiry
    alias: "Notificare Kia Rovinieta expirare"
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.notify_kia_rovinieta
        state: "on"
